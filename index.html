<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <h1>Job Application Tracker</h1>
    <p>Keep track of every job you apply to, update statuses, and stay organized.</p>
  </header>

  <main class="container">

    <section class="stats">
      <div class="stat-card"><h3 id="totalApps">0</h3><p>Total</p></div>
      <div class="stat-card"><h3 id="interviews">0</h3><p>Interviews</p></div>
      <div class="stat-card"><h3 id="offers">0</h3><p>Offers</p></div>
      <div class="stat-card"><h3 id="rejections">0</h3><p>Rejections</p></div>
    </section>

    <section class="form-section">
      <h2>Add New Application</h2>

      <form id="jobForm">
        <input type="text" id="company" placeholder="Company Name" required />
        <input type="text" id="role" placeholder="Job Title" required />
        <input type="text" id="location" placeholder="Location" />
        <input type="text" id="salary" placeholder="Salary / Pay" />
        <input type="url" id="link" placeholder="Application Link" />

        <select id="status">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Follow Up">Follow Up</option>
          <option value="Rejected">Rejected</option>
          <option value="Offer">Offer</option>
        </select>

        <input type="date" id="dateApplied" />
        <textarea id="notes" placeholder="Notes, recruiter name, follow-up details, etc."></textarea>

        <button type="submit">Add Application</button>
      </form>
    </section>

    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search company or role..." />

      <select id="filterStatus">
        <option value="All">All Statuses</option>
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Follow Up">Follow Up</option>
        <option value="Rejected">Rejected</option>
        <option value="Offer">Offer</option>
      </select>
    </section>

    <section class="table-section">
      <h2>My Applications</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Status</th>
              <th>Date Applied</th>
              <th>Location</th>
              <th>Salary</th>
              <th>Link</th>
              <th>Notes</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="jobTable"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
